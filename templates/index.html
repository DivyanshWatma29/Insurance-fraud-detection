
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Fraud Detection</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f4; }
        .container { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h1, h2 { color: #333; text-align: center; }
        form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        label { font-weight: bold; margin-bottom: 5px; display: block; }
        input[type="text"], input[type="number"], select { width: calc(100% - 10px); padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #5cb85c; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 20px; width: 100%; }
        button:hover { background-color: #4cae4c; }
        .prediction-result { text-align: center; margin-top: 30px; padding: 15px; background-color: #dff0d8; border: 1px solid #d6e9c6; border-radius: 4px; font-size: 1.2em; color: #3c763d; }
        .form-group { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Insurance Fraud Detection</h1>
        <h2>Predict if a claim is fraudulent</h2>

        <form action="/predict" method="post">
            <!-- Numerical Inputs -->
            <div class="form-group">
                <label for="months_as_customer">Months as Customer:</label>
                <input type="number" id="months_as_customer" name="months_as_customer" required value="328">
            </div>
            <div class="form-group">
                <label for="policy_deductable">Policy Deductible:</label>
                <select id="policy_deductable" name="policy_deductable" required>
                    <option value="500">500</option>
                    <option value="1000">1000</option>
                    <option value="2000">2000</option>
                </select>
            </div>
            <div class="form-group">
                <label for="policy_annual_premium">Policy Annual Premium:</label>
                <input type="number" step="0.01" id="policy_annual_premium" name="policy_annual_premium" required value="1406.91">
            </div>
            <div class="form-group">
                <label for="umbrella_limit">Umbrella Limit:</label>
                <input type="number" id="umbrella_limit" name="umbrella_limit" required value="0">
            </div>
            <div class="form-group">
                <label for="capital-gains">Capital Gains:</label>
                <input type="number" id="capital-gains" name="capital-gains" required value="53300">
            </div>
            <div class="form-group">
                <label for="capital-loss">Capital Loss:</label>
                <input type="number" id="capital-loss" name="capital-loss" required value="0">
            </div>
            <div class="form-group">
                <label for="incident_hour_of_the_day">Incident Hour (0-23):</label>
                <input type="number" id="incident_hour_of_the_day" name="incident_hour_of_the_day" min="0" max="23" required value="5">
            </div>
            <div class="form-group">
                <label for="number_of_vehicles_involved">Number of Vehicles Involved:</label>
                <select id="number_of_vehicles_involved" name="number_of_vehicles_involved" required>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
            </div>
            <div class="form-group">
                <label for="bodily_injuries">Bodily Injuries:</label>
                <select id="bodily_injuries" name="bodily_injuries" required>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                </select>
            </div>
            <div class="form-group">
                <label for="witnesses">Witnesses:</label>
                <select id="witnesses" name="witnesses" required>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            <div class="form-group">
                <label for="injury_claim">Injury Claim Amount:</label>
                <input type="number" id="injury_claim" name="injury_claim" required value="6510">
            </div>
            <div class="form-group">
                <label for="property_claim">Property Claim Amount:</label>
                <input type="number" id="property_claim" name="property_claim" required value="13020">
            </div>
            <div class="form-group">
                <label for="vehicle_claim">Vehicle Claim Amount:</label>
                <input type="number" id="vehicle_claim" name="vehicle_claim" required value="52080">
            </div>

            <!-- Categorical Inputs (using select for predefined options) -->
            <div class="form-group">
                <label for="policy_csl">Policy CSL:</label>
                <select id="policy_csl" name="policy_csl" required>
                    <option value="100/300">100/300</option>
                    <option value="250/500">250/500</option>
                    <option value="500/1000">500/1000</option>
                </select>
            </div>
            <div class="form-group">
                <label for="insured_sex">Insured Sex:</label>
                <select id="insured_sex" name="insured_sex" required>
                    <option value="FEMALE">FEMALE</option>
                    <option value="MALE">MALE</option>
                </select>
            </div>
            <div class="form-group">
                <label for="insured_education_level">Insured Education Level:</label>
                <select id="insured_education_level" name="insured_education_level" required>
                    <option value="Associate">Associate</option>
                    <option value="College">College</option>
                    <option value="High School">High School</option>
                    <option value="JD">JD</option>
                    <option value="MD">MD</option>
                    <option value="Masters">Masters</option>
                    <option value="PhD">PhD</option>
                </select>
            </div>
            <div class="form-group">
                <label for="insured_occupation">Insured Occupation:</label>
                <select id="insured_occupation" name="insured_occupation" required>
                    <option value="adm-clerical">adm-clerical</option>
                    <option value="armed-forces">armed-forces</option>
                    <option value="craft-repair">craft-repair</option>
                    <option value="exec-managerial">exec-managerial</option>
                    <option value="farming-fishing">farming-fishing</option>
                    <option value="handlers-cleaners">handlers-cleaners</option>
                    <option value="machine-op-inspct">machine-op-inspct</option>
                    <option value="other-service">other-service</option>
                    <option value="priv-house-serv">priv-house-serv</option>
                    <option value="prof-specialty">prof-specialty</option>
                    <option value="sales">sales</option>
                    <option value="tech-support">tech-support</option>
                    <option value="transport-moving">transport-moving</option>
                </select>
            </div>
            <div class="form-group">
                <label for="insured_relationship">Insured Relationship:</label>
                <select id="insured_relationship" name="insured_relationship" required>
                    <option value="husband">husband</option>
                    <option value="not-in-family">not-in-family</option>
                    <option value="other-relative">other-relative</option>
                    <option value="own-child">own-child</option>
                    <option value="unmarried">unmarried</option>
                    <option value="wife">wife</option>
                </select>
            </div>
            <div class="form-group">
                <label for="incident_type">Incident Type:</label>
                <select id="incident_type" name="incident_type" required>
                    <option value="Multi-vehicle Collision">Multi-vehicle Collision</option>
                    <option value="Parked Car">Parked Car</option>
                    <option value="Single Vehicle Collision">Single Vehicle Collision</option>
                    <option value="Vehicle Theft">Vehicle Theft</option>
                </select>
            </div>
            <div class="form-group">
                <label for="collision_type">Collision Type:</label>
                <select id="collision_type" name="collision_type" required>
                    <option value="Front Collision">Front Collision</option>
                    <option value="Rear Collision">Rear Collision</option>
                    <option value="Side Collision">Side Collision</option>
                </select>
            </div>
            <div class="form-group">
                <label for="incident_severity">Incident Severity:</label>
                <select id="incident_severity" name="incident_severity" required>
                    <option value="Major Damage">Major Damage</option>
                    <option value="Minor Damage">Minor Damage</option>
                    <option value="Total Loss">Total Loss</option>
                    <option value="Trivial Damage">Trivial Damage</option>
                </select>
            </div>
            <div class="form-group">
                <label for="authorities_contacted">Authorities Contacted:</label>
                <select id="authorities_contacted" name="authorities_contacted" required>
                    <option value="Ambulance">Ambulance</option>
                    <option value="Fire">Fire</option>
                    <option value="None">None</option>
                    <option value="Other">Other</option>
                    <option value="Police">Police</option>
                    <option value="Unknown">Unknown</option>
                </select>
            </div>
            <div class="form-group">
                <label for="property_damage">Property Damage:</label>
                <select id="property_damage" name="property_damage" required>
                    <option value="NO">NO</option>
                    <option value="YES">YES</option>
                </select>
            </div>
            <div class="form-group">
                <label for="police_report_available">Police Report Available:</label>
                <select id="police_report_available" name="police_report_available" required>
                    <option value="NO">NO</option>
                    <option value="YES">YES</option>
                </select>
            </div>
            
            <div style="grid-column: 1 / -1;">
                <button type="submit">Predict Fraud</button>
            </div>
        </form>

        {% if prediction_text %}
            <div class="prediction-result">
                {{ prediction_text }}
            </div>
        {% endif %}
    </div>
</body>
</html>
